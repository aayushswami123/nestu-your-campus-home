<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>NestU — Verified student housing. No scams, no broker fees.</title>
    <meta
      name="description"
      content="Stop playing roommate roulette. Verified subleases, AI roommate matching by lifestyle, and real neighborhood insights — built for students, interns, and international students. Free to join."
    />
    <meta name="application-name" content="NestU" />
    <meta name="author" content="NestU" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nestu.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NestU" />
    <meta property="og:url" content="https://nestu.app/" />
    <meta
      property="og:title"
      content="NestU — Verified student housing. No scams, no broker fees."
    />
    <meta
      property="og:description"
      content="Verified landlords. AI roommate matching. Real neighborhood data. Built for students, interns, and international newcomers."
    />
    <meta property="og:image" content="https://nestu.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NestU — Verified student housing" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="NestU — Verified student housing. No scams, no broker fees."
    />
    <meta
      name="twitter:description"
      content="Stop Craigslist roulette. Verified subleases, AI roommate matching, and real neighborhood insights."
    />
    <meta name="twitter:image" content="https://nestu.app/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#C75A38" />

    <!-- Google Fonts preconnect (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "NestU",
            "url": "https://nestu.app/",
            "logo": "https://nestu.app/favicon.svg",
            "description": "Verified student housing with AI roommate matching and neighborhood insights for students, interns, and international students.",
            "foundingDate": "2025",
            "founder": {
              "@type": "Person",
              "name": "Aayush Swami"
            }
          },
          {
            "@type": "WebSite",
            "name": "NestU",
            "url": "https://nestu.app/"
          },
          {
            "@type": "WebPage",
            "name": "NestU — Verified student housing waitlist",
            "url": "https://nestu.app/",
            "description": "Join the NestU waitlist for verified student housing, scam-free roommate matching, and neighborhood insights.",
            "isPartOf": { "@id": "https://nestu.app/" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
