<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>NestU: Verified student housing. No scams, no broker fees.</title>
    <meta name="description" content="NestU verifies every listing, matches you with compatible roommates, and shows you what the neighborhood is actually like. No broker fees. Free to join." />
    <meta name="application-name" content="NestU" />
    <meta name="author" content="NestU" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nestu.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NestU" />
    <meta property="og:url" content="https://nestu.app/" />
    <meta property="og:title" content="NestU: Verified student housing. No scams, no broker fees." />
    <meta property="og:description" content="NestU verifies every listing, matches you with compatible roommates, and shows you what the neighborhood is actually like. No broker fees. Free to join." />
    <meta property="og:image" content="https://nestu.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NestU: Verified student housing" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NestU: Verified student housing. No scams, no broker fees." />
    <meta name="twitter:description" content="NestU verifies every listing, matches you with compatible roommates, and shows you what the neighborhood is actually like. No broker fees. Free to join." />
    <meta name="twitter:image" content="https://nestu.app/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#C75A38" />

    <!-- Google Fonts preconnect (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://nestu.app/#org",
          "name": "NestU",
          "url": "https://nestu.app/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://nestu.app/favicon.svg"
          },
          "description": "NestU verifies campus housing listings, matches students with compatible roommates, and provides neighborhood data. No broker fees.",
          "foundingDate": "2025",
          "founder": {
            "@type": "Person",
            "name": "Aayush Swami"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "nestu-waitlist@aayushswami.com",
            "contactType": "customer support"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://nestu.app/#site",
          "name": "NestU",
          "url": "https://nestu.app/",
          "publisher": { "@id": "https://nestu.app/#org" }
        },
        {
          "@type": "WebPage",
          "@id": "https://nestu.app/",
          "name": "NestU: Verified student housing. No scams, no broker fees.",
          "url": "https://nestu.app/",
          "description": "NestU verifies every listing, matches you with compatible roommates, and shows you what the neighborhood is actually like. No broker fees. Free to join.",
          "isPartOf": { "@id": "https://nestu.app/#site" },
          "about": { "@id": "https://nestu.app/#org" }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
